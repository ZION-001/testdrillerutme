<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamDriller – WAEC Past Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --green-dark: #009624; --red: #ff3d3d;
    --bg: #0d0f14; --card: #161920; --card2: #1e2230; --border: #2a2f3e;
    --text: #e8eaf0; --muted: #6b7280; --accent: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* HOME */
  .home-header { padding: 32px 24px 0; display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 40px; height: 40px; background: var(--green); border-radius: 10px; display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 18px; color: #000; }
  .logo-text { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20px; }
  .logo-text span { color: var(--green); }
  .home-hero { padding: 40px 24px 24px; }
  .home-hero h1 { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
  .home-hero p { color: var(--muted); font-size: 14px; }
  .stats-row { display: flex; gap: 12px; margin-top: 20px; }
  .stat-pill { background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 500; }
  .stat-pill span { color: var(--green); font-weight: 700; }
  .section-label { padding: 24px 24px 12px; font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .subjects-grid { padding: 0 16px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .subj-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 14px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .subj-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--green); transform: scaleX(0); transition: transform 0.2s; transform-origin: left; }
  .subj-card:hover::before, .subj-card:active::before { transform: scaleX(1); }
  .subj-card:hover { border-color: var(--green); transform: translateY(-2px); }
  .subj-icon { font-size: 24px; margin-bottom: 8px; }
  .subj-name { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .subj-meta { font-size: 11px; color: var(--muted); }

  /* YEAR SELECT */
  .nav-bar { padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
  .back-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--card2); border: 1px solid var(--border); cursor: pointer; display: grid; place-items: center; font-size: 18px; color: var(--text); transition: all 0.15s; }
  .back-btn:hover { background: var(--border); }
  .nav-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 18px; }
  .year-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
  .year-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.15s; }
  .year-item:hover { border-color: var(--green); background: var(--card2); }
  .year-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 15px; }
  .year-count { font-size: 12px; color: var(--muted); }
  .year-arrow { color: var(--muted); font-size: 18px; }

  /* QUIZ */
  .quiz-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .quiz-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .quiz-subject { font-size: 12px; color: var(--muted); font-weight: 500; }
  .quiz-progress-text { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .quiz-body { flex: 1; overflow-y: auto; padding: 20px 20px 120px; }
  .question-num { font-size: 11px; font-weight: 700; color: var(--green); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .question-text { font-size: 16px; line-height: 1.6; margin-bottom: 24px; font-weight: 500; }
  .question-text img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: all 0.15s; text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); line-height: 1.5; }
  .option-btn:hover:not(:disabled) { border-color: #4b6bfb; background: var(--card2); }
  .option-letter { min-width: 28px; height: 28px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .option-btn.correct { border-color: var(--green); background: rgba(0,200,83,0.08); }
  .option-btn.correct .option-letter { background: var(--green); color: #000; border-color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(255,61,61,0.08); }
  .option-btn.wrong .option-letter { background: var(--red); color: #fff; border-color: var(--red); }
  .option-btn:disabled { cursor: default; }
  .explanation-box { margin-top: 16px; padding: 14px 16px; background: rgba(0,200,83,0.07); border: 1px solid rgba(0,200,83,0.2); border-radius: 12px; font-size: 13px; line-height: 1.6; color: #a7f3c5; display: none; }
  .explanation-box.show { display: block; }
  .explanation-box img { max-width: 100%; border-radius: 6px; margin: 6px 0; }
  .topic-tag { display: inline-block; margin-top: 10px; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--muted); }
  .quiz-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .btn-next, .btn-prev { flex: 1; padding: 14px; border-radius: 12px; border: none; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.15s; }
  .btn-next { background: var(--green); color: #000; }
  .btn-next:hover { background: var(--accent); }
  .btn-next:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .btn-prev { background: var(--card2); color: var(--text); border: 1px solid var(--border); flex: 0 0 56px; }

  /* RESULT */
  #result { align-items: center; justify-content: center; padding: 32px 24px; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 400px; text-align: center; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-title { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .result-score { font-size: 48px; font-family: 'Sora', sans-serif; font-weight: 800; color: var(--green); margin: 16px 0 4px; }
  .result-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .result-breakdown { display: flex; gap: 12px; margin-bottom: 28px; }
  .rb-item { flex: 1; background: var(--card2); border-radius: 12px; padding: 14px 10px; }
  .rb-val { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 4px; }
  .rb-label { font-size: 11px; color: var(--muted); }
  .btn-retry, .btn-home { width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; margin-bottom: 10px; transition: all 0.15s; }
  .btn-retry { background: var(--green); color: #000; }
  .btn-home { background: var(--card2); color: var(--text); border: 1px solid var(--border); }

  /* LOADING */
  .loading { display: none; position: fixed; inset: 0; background: rgba(13,15,20,0.92); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Sora', sans-serif; font-size: 14px; color: var(--muted); }
</style>
</head>

<div class="loading" id="loading">

  <div class="loading-text" id="loadingText">Loading questions...</div>
</div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <div class="logo-mark">E</div>
    <div class="logo-text">Exam<span>Driller</span></div>
  </div>
  <div class="home-hero">
    <h1>WAEC Past Questions</h1>
    <p>Practice with real past questions from 1994 to 2025</p>
    <div class="stats-row">

<!-- YEAR SELECT -->
<div class="screen" id="yearSelect">

  <div class="year-list" id="yearList"></div>
</div>

<!-- QUIZ -->

    <button class="btn-next" id="btnNext" onclick="nextOrFinish()">Next</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-card">

    <div class="result-title">Quiz Complete!</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="result-breakdown">

      <div class="rb-item"><div class="rb-val" id="rbWrong" style="color:var(--red)"></div><div class="rb-label">Wrong</div></div>
      <div class="rb-item"><div class="rb-val" id="rbSkipped"></div><div class="rb-label">Skipped</div></div>
    </div>
    <button class="btn-retry" onclick="retryQuiz()">Try Again</button>
    <button class="btn-home" onclick="showHome()">Back to Subjects</button>
  </div>
</div>

const ICONS = {'Accounts':'📊','Agriculture':'🌱','Arabic':'📖','Biology':'🧬','CRK':'✝️','Chemistry':'⚗️','Commerce':'💼','Computer Studies':'💻','Economics':'📈','English':'📝','Fine Art':'🎨','French':'🇫🇷','Geography':'🌍','Government':'🏛️','Hausa':'🗣️','History':'📜','Home Economics':'🏠','IRK':'☪️','Igbo':'🗣️','Literature':'📚','Literature Textbooks':'📚','Mathematics':'📐','Music':'🎵','PHE':'⚽','Physics':'🔬','The Lekki Headmaster':'📖','Yoruba':'🗣️'};

let currentSubject=null, currentQuestions=[], currentIdx=0, userAnswers=[], scriptCache={};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showHome(){ showScreen('home'); }

// Build home
(function(){
  const grid=document.getElementById('subjectsGrid');
  Object.keys(SUBJECTS).forEach(subj=>{
    const entries=SUBJECTS[subj];
    const totalQ=entries.reduce((a,e)=>a+e.count,0);
    const card=document.createElement('div');
    card.className='subj-card';
    card.innerHTML=`<div class="subj-icon">${ICONS[subj]||'📚'}</div><div class="subj-name">${subj}</div><div class="subj-meta">${entries.length} years · ${totalQ.toLocaleString()} Qs</div>`;
    card.onclick=()=>showYearSelect(subj);
    grid.appendChild(card);
  });
})();

function showYearSelect(subject){
  currentSubject=subject;
  document.getElementById('yearSelectTitle').textContent=subject;
  const list=document.getElementById('yearList');
  list.innerHTML='';
  SUBJECTS[subject].forEach(entry=>{
    const item=document.createElement('div');
    item.className='year-item';
    item.innerHTML=`<div><div class="year-name">${entry.year}</div><div class="year-count">${entry.count} questions</div></div><div class="year-arrow">›</div>`;
    item.onclick=()=>loadAndStart(subject, entry);
    list.appendChild(item);
  });
  showScreen('yearSelect');
}

function loadAndStart(subject, entry){
  if(scriptCache[entry.var]){
    startQuiz(subject, entry.year, scriptCache[entry.var]);
    return;
  }
  const loading=document.getElementById('loading');
  const loadingText=document.getElementById('loadingText');
  loading.classList.add('show');
  loadingText.textContent='Loading '+entry.year+'...';

  // Use fetch — works reliably on localhost and file://
  fetch(entry.file)
    .then(r=>{
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(code=>{
      // Execute the JS to define the variable
      const fn = new Function(code + '; return ' + entry.var + ';');
      const data = fn();
      loading.classList.remove('show');
      if(data && data.length){
        scriptCache[entry.var]=data;
        startQuiz(subject, entry.year, data);
      } else {
        alert('No questions found in file.');
      }
    })
    .catch(err=>{
      loading.classList.remove('show');
      // Fallback: try script tag
      tryScriptTag(subject, entry);
    });
}

function tryScriptTag(subject, entry){
  const loading=document.getElementById('loading');
  loading.classList.add('show');
  const s=document.createElement('script');
  s.src=entry.file+'?t='+Date.now();
  s.onload=()=>{
    loading.classList.remove('show');
    // Poll for variable
    let tries=0;
    const poll=setInterval(()=>{
      const data=window[entry.var];
      if(data){
        clearInterval(poll);
        scriptCache[entry.var]=data;
        startQuiz(subject, entry.year, data);
      } else if(++tries>20){
        clearInterval(poll);
        alert('Failed to load questions.');
      }
    },100);
  };
  s.onerror=()=>{ loading.classList.remove('show'); alert('Could not load: '+entry.file); };
  document.head.appendChild(s);
}

function startQuiz(subject, year, questions){
  currentQuestions=questions;
  currentIdx=0;
  userAnswers=new Array(questions.length).fill(null);
  document.getElementById('quizSubjectLabel').textContent=subject+' · '+year;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  const q=currentQuestions[currentIdx];
  const total=currentQuestions.length;
  const labels=['A','B','C','D','E'];
  const answered=userAnswers[currentIdx];
  document.getElementById('quizProgressText').textContent=(currentIdx+1)+' / '+total;
  document.getElementById('progressFill').style.width=((currentIdx+1)/total*100)+'%';
  const btn=document.getElementById('btnNext');
  btn.textContent=currentIdx===total-1?'Finish':'Next';
  let optHtml=q.options.map((opt,i)=>{
    let cls='';
    if(answered!==null){ if(i===q.answer)cls='correct'; else if(i===answered)cls='wrong'; }
    return `<button class="option-btn ${cls}" ${answered!==null?'disabled':''} onclick="selectAnswer(${i})"><div class="option-letter">${labels[i]}</div><div>${opt}</div></button>`;
  }).join('');
  let expHtml='';
  if(answered!==null && q.explanation && q.explanation.trim())
    expHtml=`<div class="explanation-box show"><strong>Explanation:</strong> ${q.explanation}</div>`;
  let topHtml=q.topic?`<div class="topic-tag">📌 ${q.topic}</div>`:'';
  document.getElementById('quizBody').innerHTML=`
    <div class="question-num">Question ${currentIdx+1}</div>
    <div class="question-text">${q.question}</div>
    <div class="options-list">${optHtml}</div>
    ${expHtml}${topHtml}`;
}

function selectAnswer(idx){
  if(userAnswers[currentIdx]!==null)return;
  userAnswers[currentIdx]=idx;
  renderQuestion();
}
function nextOrFinish(){
  if(currentIdx<currentQuestions.length-1){ currentIdx++; renderQuestion(); document.getElementById('quizBody').scrollTop=0; }
  else showResult();
}
function prevQuestion(){ if(currentIdx>0){ currentIdx--; renderQuestion(); } }

function showResult(){
  const total=currentQuestions.length;
  const correct=userAnswers.filter((a,i)=>a===currentQuestions[i].answer).length;
  const wrong=userAnswers.filter((a,i)=>a!==null&&a!==currentQuestions[i].answer).length;
  const skipped=userAnswers.filter(a=>a===null).length;
  const pct=Math.round(correct/total*100);
  document.getElementById('resultScore').textContent=pct+'%';
  document.getElementById('resultSub').textContent=correct+' of '+total+' correct';
  document.getElementById('rbCorrect').textContent=correct;
  document.getElementById('rbWrong').textContent=wrong;
  document.getElementById('rbSkipped').textContent=skipped;
  document.getElementById('resultEmoji').textContent=pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  document.getElementById('resultScore').style.color=pct>=60?'var(--green)':'var(--red)';
  showScreen('result');
}
function retryQuiz(){ currentIdx=0; userAnswers=new Array(currentQuestions.length).fill(null); showScreen('quiz'); renderQuestion(); }
